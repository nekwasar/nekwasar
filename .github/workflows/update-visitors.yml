name: update visitors

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: fetch & update visitor count
        run: |
          TOTAL=$(curl -sS -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/traffic/views?per=week" \
            | jq -r '.count // 0')

          COUNT=$(printf "%'d" "$TOTAL" 2>/dev/null || echo "$TOTAL")

          sed -i "s/│ [0-9,]\+ visitors/│ ${COUNT} visitors/" README.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet; then
            git add README.md
            git commit -m "bot: update visitor count (${COUNT})"
            git push
          fi
